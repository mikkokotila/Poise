<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poise</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>
  <body>
    <div id="app">
      <!-- Main view -->
      <section id="view-main" class="view">
        <header class="view-header">
          <div class="filter-cluster" id="main-filters">
            <div class="range-picker" id="filter-type">
              <button data-filter="both" class="active">All</button>
              <button data-filter="issue">Issues</button>
              <button data-filter="pr">PRs</button>
            </div>
            <div class="range-picker" id="filter-status">
              <button data-status="all" class="active">Any</button>
              <button data-status="open">Open</button>
            </div>
            <div class="range-picker" id="time-picker">
              <button data-time="all" class="active">Any time</button>
              <button data-time="today">Today</button>
              <button data-time="yesterday">Yesterday</button>
              <button data-time="week">This week</button>
            </div>
            <input class="search-input" id="search-input" type="search" placeholder="Filter…" autocomplete="off" spellcheck="false" />
            <span class="filter-count" id="count"></span>
          </div>
        </header>
        <main>
          <table id="table">
            <thead>
              <tr>
                <th class="col-type"></th>
                <th class="col-title">Title</th>
                <th class="col-last">Last</th>
                <th class="col-repo">Repo</th>
                <th class="col-status">Status</th>
                <th class="col-owner">Owner</th>
                <th class="col-state">State</th>
                <th class="col-updated">Updated</th>
                <th class="col-action"></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
          <div id="loader" class="loader"><span></span><span></span><span></span></div>
          <p id="empty" hidden>No results.</p>
        </main>
      </section>

      <!-- Stream (kanban) view (lazy-rendered into this container) -->
      <section id="view-stream" class="view" hidden></section>

      <!-- Swarm (live ops dashboard) view (lazy-rendered into this container) -->
      <section id="view-swarm" class="view" hidden></section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
