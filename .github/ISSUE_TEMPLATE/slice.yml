name: Slice
description: Plan, deliver, and close one Poise slice against mechanical proof.
labels:
  - slice
  - planning

body:

  - type: markdown
    attributes:
      value: |
        ## How this template works

        Every section below opens with a blockquoted **Significance** note. That note
        explains what the section is for and what content the section does and does not
        accept. **The Significance notes are part of the filed issue.** They ride
        alongside your content so anyone reading this issue now or a year from now
        sees both what you filled in and what the template required you to fill in.
        A slice issue without its Significance notes is not a slice issue and will be
        closed unfiled.

        Prose goals, noun-phrase objectives, philosophy of proof, taxonomy of
        guardrails: not accepted. Every section asks for a mechanical predicate:
        a command, a file path, a function signature, a commit SHA, or a CI
        workflow name that can be evaluated against repo state at merge.

  - type: input
    id: slice_id
    attributes:
      label: Slice ID
      placeholder: "S1"
    validations:
      required: true

  - type: input
    id: slice_title
    attributes:
      label: Slice Title
      description: |
        A noun phrase that names the concrete change. "Add X to Y" and "Replace A
        with B" beat "Harden the X contract" and "Freeze the Y semantics."
      placeholder: "Add behavior scratchpad memory"
    validations:
      required: true

  - type: dropdown
    id: primary_task_type
    attributes:
      label: Primary Task Type
      options:
        - proof
        - planning
        - issue_authoring
        - operator_surface
        - runtime_env
        - correctness
        - performance
        - capability
    validations:
      required: true

  - type: textarea
    id: routing
    attributes:
      label: Routing and Dependencies
      value: |
        > **Significance.** Routing is the minimum information needed to place this
        > slice in the dependency graph. Parent and dependencies must be existing
        > issue numbers; unlocks may be forward-looking. Prose description of the
        > relationship is not accepted, only issue references. This section is not
        > a planning document; it is a graph edge list.

        Parent issue:
        Depends on:
        -
        Unlocks:
        -
    validations:
      required: true

  - type: textarea
    id: capability
    attributes:
      label: Capability
      value: |
        > **Significance.** A slice delivers exactly one capability. The capability
        > must be expressible as a set of assertions that become mechanically true
        > at merge. This is the answer to what changes in the system that an
        > external observer can verify by running a command. Every line below
        > must be evaluable as a shell command, JavaScript expression, or HTTP
        > request that returns a definite result. One assertion per line.
        >
        > Accepted:
        > - `node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).name"` returns `poise`.
        > - `npm run build` returns exit code `0`.
        > - `test -f server/cache-plugin.ts && echo present` returns `present`.
        >
        > Rejected:
        > - *Clean up the dashboard.*
        > - *Improve local workflow quality.*
        > - *Make the app more robust.*

        Assertions (one per line, each executable as-is):
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: objective_baseline_scope
    attributes:
      label: Objective, Baseline, and Scope
      value: |
        > **Significance.** Objective, baseline, and scope define the smallest
        > useful change. The objective states the outcome. Baseline is repo or
        > runtime state today, expressed as commands and outputs a reader can run
        > against `main`. Scope names the exact surfaces this slice may touch.
        >
        > Accepted:
        > - `git show HEAD:package.json | grep -c '"name": "poise"'` returns `1`.
        > - `test -f src/main.ts && echo present` returns `present`.
        >
        > Rejected:
        > - *The system has accumulated technical debt.*
        > - *Several paths are confusing.*

        Objective:

        Baseline commands with output (one per line):
        -
        -
        -

        Scope:
        -
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: Design
      value: |
        > **Significance.** Design is the end-to-end shape of the solution. Name
        > the concrete files, commands, interfaces, and data flow that make the
        > capability true. Do not restate the objective.

        Design:
    validations:
      required: true

  - type: textarea
    id: runtime_observability_scope
    attributes:
      label: Runtime and Observability Scope
      value: |
        > **Significance.** Runtime and observability scope states whether this
        > slice changes execution behavior, environment, telemetry, logs, metrics,
        > alerts, or operational proof. If there is no runtime touch, say so.

        Runtime touch:
        Observability touch:
        Operational proof:
    validations:
      required: true

  - type: textarea
    id: proof_coverage
    attributes:
      label: Proof Coverage
      value: |
        > **Significance.** Proof coverage names the commands that must return the
        > stated result after merge. These commands are the proof obligation of the
        > slice. Each one maps to a test or CI gate in the Proof section below.
        > Vague targets like "the system is faster" or "the contract is hardened"
        > are rejected; state the measurable predicate.
        >
        > Accepted:
        > - `npm run build` returns exit code `0`.
        > - `node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version"` returns `0.0.1`.
        > - `test -f src/views/main-view.ts && echo present` returns `present`.

        Commands with output on the merge commit (one per line):
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: surfaces
    attributes:
      label: Surfaces
      value: |
        > **Significance.** This is the mechanical scope contract. List every file
        > path that the PR delivering this slice will modify, add, or remove.
        > Files outside these three lists must not change. A scope-check CI step
        > compares the PR's changed-file set against this list and fails if they
        > diverge. The scope model is: "out of scope is every file not listed
        > here." Glob patterns are permitted; prose is not.

        Modified (exact paths relative to repo root, or globs):
        -

        Added:
        -

        Removed:
        -
    validations:
      required: true

  - type: textarea
    id: signature_diff
    attributes:
      label: Signature Diff
      value: |
        > **Significance.** For every surface in the list above that has a public
        > signature, give the `Before` and `After` forms as code blocks. These
        > signatures are the contract future PRs cannot silently regress. Prose
        > like "rename the function" or "make it fail-loud" is rejected.

        ### <file>::<symbol>
        Before:
        ```

        ```
        After:
        ```

        ```
    validations:
      required: true

  - type: textarea
    id: proof
    attributes:
      label: Proof
      value: |
        > **Significance.** Every assertion in the Capability section above has
        > exactly one proof row. Each row names the assertion, the file path or
        > command that proves it, and the test or check name. Prose like "terminal
        > proof obligation" is rejected.

        | Capability assertion | proof file or command | test or check name |
        |---|---|---|
        |  |  |  |
        |  |  |  |
        |  |  |  |
    validations:
      required: true

  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      value: |
        > **Significance.** A slice is not complete if its capability can be
        > silently removed by the next PR. Name the workflow, check, or command
        > that will fail a future regression. If no such gate exists today,
        > creating it is part of this slice.
        >
        > Accepted:
        > - Command `npm run build`, which runs `tsc && vite build` and fails
        >   when TypeScript or the Vite production build fails.
        >
        > Rejected:
        > - *A guardrail will be added later.*
        > - *Invariants documented in the slice spec.*

        Workflow file:
        Job or check name:
        Specific failing command or action:
    validations:
      required: true

  - type: textarea
    id: step_register
    attributes:
      label: Step Register
      value: |
        > **Significance.** Step Register is the ordered execution backlog for
        > this slice. Each step must name a concrete edit, command, or GitHub
        > action. It is not a narrative plan.

        Steps:
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      value: |
        > **Significance.** The slice PR must not touch the paths listed here.
        > A scope-check CI step compares the PR diff against this list and fails
        > if any out-of-scope path appears in the diff. This is the mechanical
        > complement to the Surfaces section above. "Out of scope" here is not
        > aspirational; it is a CI-enforced block.

        Paths that must not change in this slice's PR (globs permitted):
        -
        -
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks and Open Questions
      value: |
        > **Significance.** Short. Only risks that change the decision tree for
        > this slice belong here. A risk that is resolved by doing more
        > engineering work is engineering work, not a risk, and goes in the
        > Proof Coverage section instead.

        Risks:
        -

        Open questions:
        -
    validations:
      required: false

  - type: textarea
    id: done_means
    attributes:
      label: Done Means
      value: |
        > **Significance.** Done Means closes on verifiable evidence, not on a
        > self-assessed claim. Check each item only when the linked evidence
        > exists. Fill the closeout fields after merge.

        - [ ] Capability complete
        - [ ] Proof complete
        - [ ] Guardrails complete
        - [ ] Required gates green
        - [ ] Required docs updated
        - [ ] Required closeout state and evidence links are recorded in this issue

        Merge SHA:
        Merged PR number:
        Required CI runs (workflow name : run id):
        -
        -
    validations:
      required: true

  - type: checkboxes
    id: author_checks
    attributes:
      label: Author Checks
      options:
        - label: The Significance blockquote at the top of every section above remains in this issue unchanged.
          required: true
        - label: Every Capability assertion is executable and has a definite expected output.
          required: true
        - label: Every Capability assertion has exactly one row in the Proof table.
          required: true
        - label: Every Surfaces entry with a public signature has a corresponding Signature Diff entry with literal Before and After code blocks.
          required: true
        - label: Guardrails cites a workflow, check, or command that fails on regression.
          required: true
        - label: Objective, Baseline, and Scope entries and Proof Coverage entries contain commands, not prose.
          required: true
